[target.x86_64-unknown-linux-gnu]
# Enable all native CPU features (AVX-512/AVX2/FMA/BMI2…)
# For distribution: RUSTFLAGS="-C target-cpu=x86-64-v3" cargo build --release
rustflags = ["-C", "target-cpu=native"]

[target.x86_64-pc-windows-msvc]
# Native SIMD enabled on Windows dev/bench builds.
# The runtime feature detection in hot_kernels.rs ensures safe dispatch at all times.
# For distribution builds: change to "-C target-cpu=x86-64-v3"
rustflags = ["-C", "target-cpu=native"]

[target.x86_64-pc-windows-gnu]
rustflags = ["-C", "target-cpu=native"]

[target.x86_64-unknown-linux-musl]
rustflags = ["-C", "target-cpu=native"]

# ── Benchmark profile: accurate local numbers ─────────────────────────────────
[profile.bench]
lto = "thin"
codegen-units = 1
opt-level = 3

# ── PGO: Profile-Guided Optimization workflow ─────────────────────────────────
# Step 1 — Instrument build (Windows PowerShell):
#   $env:RUSTFLAGS="-Cprofile-generate=C:/tmp/pgo-data"
#   cargo build --profile=release-pgo
#
# Step 2 — Run the real workload once to collect .profraw files.
#
# Step 3 — Merge profiles and recompile:
#   llvm-profdata merge -output=C:/tmp/pgo-data/merged.profdata C:/tmp/pgo-data/*.profraw
#   $env:RUSTFLAGS="-Cprofile-use=C:/tmp/pgo-data/merged.profdata -Cllvm-args=-pgo-warn-missing-function"
#   cargo build --release
